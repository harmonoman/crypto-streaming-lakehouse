name: crypto-streaming-pipeline

networks:
  crypto_net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:

services:

  # ── PostgreSQL (Medallion Storage) ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crypto_postgres
    restart: unless-stopped
    networks:
      - crypto_net
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── RabbitMQ (Message Broker) ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: crypto_rabbitmq
    restart: unless-stopped
    networks:
      - crypto_net
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Metabase (BI Dashboard) ──────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.49.6
    container_name: crypto_metabase
    restart: unless-stopped
    networks:
      - crypto_net
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      # Suppress Metabase's own analytics/telemetry
      MB_SEND_EMAIL_ON_FIRST_LOGIN: "false"
      JAVA_OPTS: "-Xmx512m"
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s