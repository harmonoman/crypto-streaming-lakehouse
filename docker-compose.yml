name: crypto-streaming-pipeline

networks:
  crypto_net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  metabase_data:

services:

  # ── PostgreSQL (Medallion Storage) ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crypto_postgres
    restart: unless-stopped
    networks:
      - crypto_net
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces TCP (not Unix socket) and verifies the target DB
      # exists, not just that the process is listening.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── RabbitMQ (Message Broker) ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: crypto_rabbitmq
    restart: unless-stopped
    networks:
      - crypto_net
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Metabase (BI Dashboard) ──────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.49.6
    platform: linux/amd64
    container_name: crypto_metabase
    restart: unless-stopped
    networks:
      - crypto_net
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SEND_EMAIL_ON_FIRST_LOGIN: "false"
      JAVA_OPTS: "-Xmx512m"
    volumes:
      - metabase_data:/metabase-data
      - ./data:/data
    # Metabase only depends on Postgres (metadata store).
    # No dependency on RabbitMQ — they are independent services.
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # curl is present in metabase/metabase:v0.49.6 — verify on image upgrade.
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # ── Producer (WebSocket → RabbitMQ) ─────────────────────────────
  producer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: crypto_producer
    restart: unless-stopped
    networks:
      - crypto_net
    environment:
      AMQP_URL:              amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@crypto_rabbitmq:5672/
      RABBITMQ_EXCHANGE:     ${RABBITMQ_EXCHANGE}
      RABBITMQ_ROUTING_KEY:  ${RABBITMQ_ROUTING_KEY}
      WEBSOCKET_URL:         ${WEBSOCKET_URL}
      PRODUCT_ID:            ${PRODUCT_ID}
      PRODUCER_METRICS_PORT: ${PRODUCER_METRICS_PORT:-8000}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    stop_grace_period: 35s
    command: ["python", "-m", "producer.main"]

# ── Consumer (RabbitMQ → PostgreSQL Bronze) ──────────────────────
  consumer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: crypto_consumer
    restart: unless-stopped
    networks:
      - crypto_net
    environment:
      AMQP_URL:              amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@crypto_rabbitmq:5672/
      RABBITMQ_QUEUE:        ${RABBITMQ_QUEUE}
      DATABASE_URL:          postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@crypto_postgres:5432/${POSTGRES_DB}
      CONSUMER_PREFETCH:     ${CONSUMER_PREFETCH:-100}
      BATCH_SIZE:            ${BATCH_SIZE:-200}
      BATCH_TIMEOUT_MS:      ${BATCH_TIMEOUT_MS:-2000}
      CONSUMER_METRICS_PORT: ${CONSUMER_METRICS_PORT:-8001}
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    stop_grace_period: 35s
    command: ["python", "-m", "consumer.main"]
