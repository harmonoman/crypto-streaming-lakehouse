version: 2

models:
  - name: stg_trades
    description: >
      Typed, deduplicated trade events extracted from bronze.raw_trades.
      One row per unique trade_id. All fields are cast to their correct types.

    columns:

      - name: trade_id
        description: Unique Coinbase trade identifier — deduplication key.
        tests:
          - unique
          - not_null

      - name: price
        description: Execution price in USD, cast to NUMERIC(18,8).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0.00000001
                max_value: 1000000

      - name: size
        description: Trade size in BTC, cast to NUMERIC(18,8).
        tests:
          - not_null

      - name: side
        description: Trade direction — must be exactly 'buy' or 'sell'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['buy', 'sell']

      - name: traded_at
        description: Trade execution timestamp in UTC, cast from Coinbase ISO 8601 string.
        tests:
          - not_null

      - name: ingested_at
        description: Timestamp when the row was written to bronze by the consumer.
        tests:
          - not_null
